<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hardy Store</title>

<style>
body {
  margin:0;
  font-family:"Segoe UI";
  background:#0a0a1f;
  color:white;
  overflow-x:hidden;
}

/* LOADING */
#loading {
  position:fixed;
  width:100%;
  height:100%;
  background:#0a0a1f;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:25px;
  animation:pulse 1s infinite;
}
@keyframes pulse {
  0%{opacity:0.5}
  50%{opacity:1}
  100%{opacity:0.5}
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.logo {
  width:100%;
  max-height:200px;
  object-fit:cover;
}

/* TÍTULOS */
.titulo {
  margin:20px;
  font-size:22px;
  color:#ff66cc;
}

/* LINHA */
.linha {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

/* PRODUTOS */
.produto {
  min-width:170px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:15px;
  transition:0.3s;
}

.produto:hover {
  transform:translateY(-5px) scale(1.05);
  box-shadow:0 0 25px #ff0080;
}

/* BOTÃO */
button {
  background:linear-gradient(45deg,#ff0080,#ffcc00);
  border:none;
  padding:8px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* CARRINHO */
.carrinho {
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:#111;
  padding:15px;
  transition:0.4s;
}

.carrinho.ativo {
  right:0;
}

/* RODAPÉ */
footer {
  text-align:center;
  padding:20px;
  opacity:0.5;
}
</style>
</head>

<body>

<div id="loading">Carregando loja...</div>

<nav>
<h2>Hardy Store</h2>
<div onclick="toggleCarrinho()">🛒</div>
</nav>

<img src="https://cdn.discordapp.com/attachments/1487649742501707820/1497682491639726371/file_00000000f050720e96601de1627a78c9.png" class="logo">

<!-- INCOMUNS -->
<div class="titulo">✨ Incomuns</div>
<div class="linha">
<div class="produto"><p>Blossom</p><p>R$0.50</p><button onclick="add('Blossom',0.5)">+</button></div>
<div class="produto"><p>Floatie</p><p>R$0.80</p><button onclick="add('Floatie',0.8)">+</button></div>
<div class="produto"><p>Lucky</p><p>R$0.65</p><button onclick="add('Lucky',0.65)">+</button></div>
</div>

<!-- SETS -->
<div class="titulo">🔥 Sets</div>
<div class="linha">
<div class="produto"><p>Set Fire</p><p>R$3.10</p><button onclick="add('Set Fire',3.1)">+</button></div>
<div class="produto"><p>Set Portal</p><p>R$1.30</p><button onclick="add('Set Portal',1.3)">+</button></div>
</div>

<!-- CHROMAS -->
<div class="titulo">💎 Chromas</div>
<div class="linha">
<div class="produto"><p>Lightbringer C</p><p>R$6.50</p><button onclick="add('Lightbringer C',6.5)">+</button></div>
</div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<h3>🛒 Carrinho</h3>
<ul id="lista"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button onclick="finalizar()">Enviar Pedido</button>
</div>

<footer>
© Hardy Store — 2026
</footer>

<script>
let carrinho=[];
let total=0;

/* loading */
window.onload=()=>{
  document.getElementById("loading").style.display="none";
}

function add(nome,preco){
  carrinho.push({nome,preco});
  total+=preco;
  atualizar();
}

function atualizar(){
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  carrinho.forEach((i,index)=>{
    let li=document.createElement("li");
    li.innerHTML=i.nome+" - "+i.preco+
    " <button onclick='remover("+index+")'>X</button>";
    lista.appendChild(li);
  });
  document.getElementById("total").textContent=total.toFixed(2);
}

function remover(i){
  total-=carrinho[i].preco;
  carrinho.splice(i,1);
  atualizar();
}

function toggleCarrinho(){
  document.getElementById("carrinho").classList.toggle("ativo");
}

function finalizar(){
  let msg="Pedido:%0A";
  carrinho.forEach(i=>{
    msg+=i.nome+" - R$ "+i.preco+"%0A";
  });
  msg+="Total: R$ "+total.toFixed(2);
  window.open("https://wa.me/555192175255?text="+msg);
}
</script>

</body>
</html>
