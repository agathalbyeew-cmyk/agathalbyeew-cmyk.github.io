<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
:root{
 --pink:#ff4ecd;
 --purple:#7b5cff;
 --blue:#3ca6ff;
 --orange:#ff9a3c;
 --dark:#0f0f14;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{
 background: linear-gradient(135deg,var(--purple),var(--blue));
 color:white;
}

header{
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 backdrop-filter: blur(10px);
}

.logo{
 font-size:24px;
 font-weight:700;
}

button{
 border:none;
 padding:10px 18px;
 border-radius:20px;
 background: linear-gradient(45deg,var(--pink),var(--orange));
 color:white;
 cursor:pointer;
 transition:0.3s;
}
button:hover{
 transform:scale(1.05);
 box-shadow:0 0 15px rgba(255,255,255,0.4);
}

.banner{
 text-align:center;
 padding:60px 20px;
}

.banner h1{
 font-size:32px;
}

.container{
 padding:20px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;
}

.card{
 background:rgba(255,255,255,0.08);
 border-radius:20px;
 padding:15px;
 backdrop-filter:blur(12px);
 transition:0.3s;
}
.card:hover{
 transform:translateY(-5px);
}

.card img{
 width:100%;
 border-radius:15px;
}

.cart{
 position:fixed;
 top:20px;
 right:20px;
 background:rgba(0,0,0,0.6);
 padding:15px;
 border-radius:15px;
}

footer{
 text-align:center;
 padding:20px;
 margin-top:40px;
}
</style></head><body><header>
<div class="logo">Hardy Store</div>
<button onclick="scrollToProducts()">Ver Produtos</button>
</header><section class="banner">
<h1>Os melhores itens de Murder Mystery 2</h1>
<p>Entrega rápida ⚡ | Preços competitivos 💰</p>
</section><div class="container" id="produtos">
<h2>Produtos</h2>
<div class="grid" id="productList"></div>
</div><div class="cart" id="cart">
<h3>Carrinho</h3>
<div id="cartItems"></div>
<p>Total: R$ <span id="total">0</span></p>
<input placeholder="Seu nome" id="name">
<input placeholder="WhatsApp" id="whats">
<button onclick="checkout()">Finalizar</button>
</div><footer>
<p>© Hardy Store</p>
<p>Discord: https://discord.gg/uz5c9QYNzG</p>
</footer><script>
let products = [
 {name:"Icewing",price:10,img:"https://via.placeholder.com/200"},
 {name:"Darkbringer",price:25,img:"https://via.placeholder.com/200"}
];

let cart = [];

function renderProducts(){
 let list = document.getElementById('productList');
 list.innerHTML = '';
 products.forEach((p,i)=>{
  list.innerHTML += `
  <div class="card">
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p>R$ ${p.price}</p>
    <button onclick="addToCart(${i})">Adicionar</button>
  </div>`;
 });
}

function addToCart(i){
 cart.push(products[i]);
 updateCart();
}

function updateCart(){
 let cartDiv = document.getElementById('cartItems');
 cartDiv.innerHTML = '';
 let total = 0;
 cart.forEach((item,index)=>{
  total += item.price;
  cartDiv.innerHTML += `<p>${item.name} - R$${item.price}</p>`;
 });
 document.getElementById('total').innerText = total;
}

function checkout(){
 let name = document.getElementById('name').value;
 let whats = document.getElementById('whats').value;
 alert(`Pedido feito por ${name} Total R$${document.getElementById('total').innerText}`);
}

function scrollToProducts(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

renderProducts();
</script></body>
</html>
