<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hardy Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #3a0a5a, #0a0a1f);
  color: white;
}

/* LOGO */
.logo {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  box-shadow: 0 0 30px rgba(255,0,150,0.5);
}

/* HEADER */
header {
  text-align: center;
}

/* TÍTULO */
h1 {
  font-size: 40px;
  background: linear-gradient(45deg, #ff0080, #ffcc00);
  -webkit-background-clip: text;
  color: transparent;
}

/* PRODUTOS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.produto {
  background: rgba(20,20,40,0.9);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  width: 200px;
  box-shadow: 0 0 15px rgba(255,0,150,0.4);
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.07);
}

/* BOTÃO */
button {
  background: linear-gradient(45deg, #ff0080, #ff8c00);
  border: none;
  padding: 10px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: 10px;
  top: 10px;
  background: #111;
  padding: 15px;
  border-radius: 15px;
  width: 250px;
  box-shadow: 0 0 20px #ff0080;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

.checkout {
  margin-top: 10px;
  width: 100%;
}
</style>

</head>

<body>

<header>
<img src="https://cdn.discordapp.com/attachments/1487649742501707820/1497682491639726371/file_00000000f050720e96601de1627a78c9.png" class="logo">
<h1>Hardy Store 🔥</h1>
</header>

<!-- PRODUTOS -->
<div class="container">

<div class="produto">
<p>Blossom</p>
<p>R$ 0,50</p>
<button onclick="addCarrinho('Blossom', 0.50)">Adicionar</button>
</div>

<div class="produto">
<p>Floatie</p>
<p>R$ 0,80</p>
<button onclick="addCarrinho('Floatie', 0.80)">Adicionar</button>
</div>

<div class="produto">
<p>Set Fire</p>
<p>R$ 3,10</p>
<button onclick="addCarrinho('Set Fire', 3.10)">Adicionar</button>
</div>

<div class="produto">
<p>Lightbringer C</p>
<p>R$ 6,50</p>
<button onclick="addCarrinho('Lightbringer C', 6.50)">Adicionar</button>
</div>

</div>

<!-- CARRINHO -->
<div class="carrinho">
<h3>🛒 Carrinho</h3>
<ul id="lista"></ul>
<div class="total">Total: R$ <span id="total">0.00</span></div>

<button class="checkout" onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<script>
let carrinho = [];
let total = 0;

function addCarrinho(nome, preco) {
  carrinho.push({nome, preco});
  total += preco;
  atualizar();
}

function atualizar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrinho.forEach(item => {
    let li = document.createElement("li");
    li.textContent = item.nome + " - R$ " + item.preco.toFixed(2);
    lista.appendChild(li);
  });

  document.getElementById("total").textContent = total.toFixed(2);
}

function finalizar() {
  let numero = "555192175255";
  let mensagem = "Pedido:%0A";

  carrinho.forEach(item => {
    mensagem += item.nome + " - R$ " + item.preco.toFixed(2) + "%0A";
  });

  mensagem += "%0ATotal: R$ " + total.toFixed(2);

  window.open("https://wa.me/" + numero + "?text=" + mensagem);
}
</script>

</body>
</html>
