<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
:root{
 --grad: linear-gradient(135deg,#ff4ecd,#7a5cff,#00c2ff,#ff9a3c);
}

*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#0b0b14;
 color:white;
}

header{
 text-align:center;
 padding:20px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(12px);
}

.logo{
 font-size:2.2em;
 font-weight:700;
 background:var(--grad);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.hero{
 text-align:center;
 padding:60px 20px;
}

.hero h1{
 font-size:2.8em;
 margin-bottom:10px;
}

.hero button{
 margin-top:20px;
 padding:14px 30px;
 border:none;
 border-radius:30px;
 background:var(--grad);
 color:white;
 font-weight:600;
 cursor:pointer;
 transition:0.2s;
}
.hero button:hover{
 transform:scale(1.05);
 box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.container{padding:20px}

.search{
 width:100%;
 max-width:300px;
 margin:0 auto 20px;
 display:block;
 padding:12px;
 border-radius:25px;
 border:none;
 outline:none;
}

.cat-title{
 margin:30px 0 10px;
 font-size:1.4em;
 color:#ff9a3c;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
 gap:12px;
}

.card{
 background:rgba(255,255,255,0.05);
 border-radius:14px;
 padding:12px;
 display:flex;
 flex-direction:column;
 justify-content:space-between;
 transition:0.2s;
}

.card:hover{
 transform:translateY(-4px);
 box-shadow:0 0 12px rgba(255,255,255,0.15);
}

.price{
 font-weight:700;
 color:#00ffcc;
}

button.add{
 margin-top:8px;
 padding:10px;
 border:none;
 border-radius:25px;
 background:var(--grad);
 color:white;
 font-weight:600;
 cursor:pointer;
 transition:0.2s;
}

button.add:hover{
 transform:scale(1.05);
 box-shadow:0 0 12px rgba(255,255,255,0.3);
}

button.add:active{
 transform:scale(0.95);
}

#cart{
 position:fixed;
 bottom:10px;
 right:10px;
 width:260px;
 background:#121226;
 border-radius:15px;
 padding:15px;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#cart h3{margin-top:0}

#cartItems{
 max-height:120px;
 overflow:auto;
 margin:10px 0;
}

#cartItems li{
 font-size:0.9em;
 margin-bottom:4px;
}

.total{
 font-weight:700;
 color:#00ffcc;
}

input{
 width:100%;
 padding:8px;
 margin-top:5px;
 border-radius:10px;
 border:none;
}

.checkout{
 margin-top:10px;
 width:100%;
 padding:12px;
 border:none;
 border-radius:25px;
 background:#25D366;
 color:white;
 font-weight:700;
 cursor:pointer;
}

.checkout:hover{
 transform:scale(1.05);
}

</style></head>
<body><header>
<div class="logo">Hardy Store</div>
</header><section class="hero">
<h1>Itens baratos de verdade</h1>
<p>Compra rápida • Entrega confiável • Sem enrolação</p>
<button onclick="scrollToProducts()">Explorar Loja</button>
</section><div class="container" id="produtos">
<input class="search" placeholder="Buscar item..." onkeyup="searchItem(this.value)">
<div id="products"></div>
</div><div id="cart">
<h3>Carrinho</h3>
<ul id="cartItems"></ul>
<p class="total">Total: R$ <span id="total">0.00</span></p>
<input id="name" placeholder="Seu nome">
<input id="whatsapp" placeholder="WhatsApp">
<button class="checkout" onclick="checkout()">Finalizar no WhatsApp</button>
</div><script>

const data = {
"Chromas":[['Lightbringer C',6.5],['Darkbringer C',6.5],['Luger C',6.5],['Candleflame C',5.9]],
"Low Sets":[['Eternal set',5.8],['Hallow set',4.7]],
"Incomuns":[['Blossom x2',0.5],['Floatie x2',0.8]],
"Sets":[['Set carrot x2',1.4],['Set clownfish x4',0.9]]
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function render(){
 const container=document.getElementById('products');
 container.innerHTML='';

 Object.keys(data).forEach(cat=>{
 container.innerHTML += `<div class="cat-title">${cat}</div><div class="grid">${data[cat].map(p=>`
 <div class="card">
 <div>${p[0]}</div>
 <div class="price">R$ ${p[1].toFixed(2)}</div>
 <button class="add" onclick="add('${p[0]}',${p[1]})">Adicionar</button>
 </div>`).join('')}</div>`;
 });
}

function add(name,price){
 cart.push({name,price});
 localStorage.setItem('cart',JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 let total=0;
 const list=document.getElementById('cartItems');
 list.innerHTML='';
 cart.forEach(i=>{
 total+=i.price;
 list.innerHTML += `<li>${i.name}</li>`;
 });
 document.getElementById('total').innerText=total.toFixed(2);
}

function checkout(){
 const name=document.getElementById('name').value;
 const total=document.getElementById('total').innerText;
 const msg=`Pedido Hardy Store%0ACliente:${name}%0ATotal:R$${total}`;
 window.open(`https://wa.me/555192175255?text=${msg}`);
}

function searchItem(q){
 q=q.toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
 c.style.display = c.innerText.toLowerCase().includes(q)?'flex':'none';
 });
}

function scrollToProducts(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

render();
updateCart();

</script></body>
</html>
