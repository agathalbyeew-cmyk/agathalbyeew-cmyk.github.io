<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root{
 --grad: linear-gradient(135deg,#ff4ecd,#7a5cff,#00c2ff,#ff9a3c);
}

*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#0b0b14;
 color:white;
}

header{
 display:flex;
 justify-content:center;
 align-items:center;
 padding:20px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
}

.logo{
 font-size:2em;
 font-weight:700;
 background:var(--grad);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.hero{
 padding:60px 20px;
 text-align:center;
}

.hero h1{
 font-size:3em;
 background:var(--grad);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.hero p{opacity:0.8}

.hero button{
 margin-top:20px;
 padding:15px 35px;
 border:none;
 border-radius:30px;
 background:var(--grad);
 color:white;
 cursor:pointer;
}

.container{padding:20px}

.search{
 display:block;
 margin:20px auto;
 padding:10px;
 border-radius:20px;
 border:none;
 width:250px;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:15px;
}

.card{
 background:rgba(255,255,255,0.04);
 border-radius:15px;
 padding:12px;
 transition:0.3s;
}

.card:hover{
 transform:translateY(-5px);
 box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.cat-title{
 margin-top:40px;
 font-size:1.5em;
 border-left:4px solid #ff4ecd;
 padding-left:10px;
}

button.add{
 width:100%;
 margin-top:10px;
 padding:8px;
 border:none;
 border-radius:20px;
 background:var(--grad);
 color:white;
 cursor:pointer;
}

#cart{
 position:fixed;
 right:10px;
 bottom:10px;
 width:260px;
 background:#121226;
 border-radius:15px;
 padding:15px;
}

</style></head>
<body><header>
<div class="logo">Hardy Store</div>
</header><section class="hero">
<h1>Ofertas reais</h1>
<p>Itens raros • Preços baixos • Entrega rápida</p>
<button onclick="scrollToProducts()">Ver Loja</button>
</section><div class="container" id="produtos">
<input class="search" placeholder="Buscar item..." onkeyup="searchItem(this.value)">
<div id="products"></div>
</div><div id="cart">
<h3>Carrinho</h3>
<ul id="cartItems"></ul>
<p>Total: R$ <span id="total">0</span></p>
<input id="name" placeholder="Nome">
<input id="whatsapp" placeholder="WhatsApp">
<button class="add" onclick="checkout()">Finalizar</button>
</div><script>

const data = {
"Chromas":[
['Lightbringer C',6.5],['Darkbringer C',6.5],['Luger C',6.5],['Candleflame C',5.9],['Elderwoodblade C',5.9],['Shark C',5.9],['SwirlyGun C',5.9],['Gemstone C',4.5],['Saw C',4.5],['Gingerblade C',4.5],['Cookiecane C',4.5],['Deathshard C',4.5],['Fang C',4.5],['Heat C',4.5],['Slasher C',4.5],['Tides C',4.5],['Boneblade C',4.5],['Seer C',4.5]
],
"Low Sets":[
['Eternal set',5.8],['Hallow set',4.7],['Seer set 6x',4.7],['Battleaxe set',4.2],['Iceflake set',4.0],['Old Glory set',4.0],['Plasma set',4.0],['Log set',4.0],['Slasher set',4.0],['Xmas set',4.0],['EternalCane set',3.5],['Gingerblade set',3.5]
],
"Incomuns":[
['Blossom x2',0.5],['Floatie x2',0.8],['Jelly fish',0.5],['Meadow',0.8],['Painted',0.8],['Paws',0.5]
],
"Sets Colecionáveis":[
['Set carrot x2',1.4],['Set clownfish x4',0.9],['Set fragile',2.3],['Set starfish',0.5],['Set toy x2',1.3]
]
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function render(){
 const container=document.getElementById('products');
 container.innerHTML='';

 Object.keys(data).forEach(cat=>{
 container.innerHTML += `<div class="cat-title">${cat}</div><div class="grid">${data[cat].map((p,i)=>`
 <div class="card">
 <h4>${p[0]}</h4>
 <p>R$ ${p[1]}</p>
 <button class="add" onclick="add('${p[0]}',${p[1]})">Adicionar</button>
 </div>`).join('')}</div>`;
 });
}

function add(name,price){
 cart.push({name,price});
 localStorage.setItem('cart',JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 let total=0;
 const list=document.getElementById('cartItems');
 list.innerHTML='';
 cart.forEach(i=>{
 total+=i.price;
 list.innerHTML += `<li>${i.name}</li>`;
 });
 document.getElementById('total').innerText=total.toFixed(2);
}

function checkout(){
 const name=document.getElementById('name').value;
 const total=document.getElementById('total').innerText;
 const msg=`Pedido Hardy Store%0ACliente:${name}%0ATotal:R$${total}`;
 window.open(`https://wa.me/555192175255?text=${msg}`);
}

function searchItem(q){
 q=q.toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
 c.style.display = c.innerText.toLowerCase().includes(q)?'block':'none';
 });
}

function scrollToProducts(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

render();
updateCart();

</script></body>
</html>
