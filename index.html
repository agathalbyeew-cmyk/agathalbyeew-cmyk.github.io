<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"><style>
:root{
 --pink:#ff4ecd;
 --orange:#ff9a3c;
 --blue:#3aa6ff;
 --purple:#7a5cff;
 --grad: linear-gradient(135deg,var(--pink),var(--purple),var(--blue),var(--orange));
}

*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:linear-gradient(135deg,#1a1f5a,#3a2c8f,#6a2fa8);
 color:white;
}

header{text-align:center;padding:20px}
.logo{font-size:2.5em;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

#cartBtn{
 position:fixed;
 top:20px;
 right:20px;
 background:var(--grad);
 border:none;
 border-radius:50px;
 padding:12px 18px;
 color:white;
 font-weight:600;
 cursor:pointer;
}

.hero{text-align:center;padding:50px 20px}
.hero h1{font-size:2.5em}
.hero button{margin-top:20px;padding:14px 30px;border:none;border-radius:30px;background:var(--grad);color:white;cursor:pointer}

.container{padding:20px}
.search{width:100%;max-width:300px;margin:0 auto 20px;display:block;padding:12px;border-radius:25px;border:none}

.cat-title{margin:30px 0 10px;font-size:1.4em;color:var(--orange)}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}

.card{
 background:rgba(255,255,255,0.08);
 border-radius:14px;
 padding:10px;
 transition:0.2s;
 cursor:pointer;
 text-align:center;
}

.card img{
 width:100%;
 height:80px;
 object-fit:contain;
 margin-bottom:5px;
}

.card:hover{transform:translateY(-4px);box-shadow:0 0 12px rgba(255,255,255,0.2)}

.price{font-weight:700;color:#00ffd5}

#cartModal{
 display:none;
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.6);
 justify-content:center;
 align-items:center;
}

.cartBox{background:#121226;padding:20px;border-radius:15px;width:300px}
.total{font-weight:700;color:#00ffd5}

input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none}

.checkout{margin-top:10px;width:100%;padding:12px;border:none;border-radius:25px;background:#25D366;color:white;font-weight:700;cursor:pointer}

.badge{
 display:inline-block;
 margin-top:5px;
 font-size:0.7em;
 background:var(--grad);
 padding:3px 6px;
 border-radius:10px;
}

</style></head>
<body><header>
<div class="logo">Hardy Store</div>
</header><button id="cartBtn" onclick="toggleCart()">🛒 Carrinho</button>

<section class="hero">
<h1>Itens estilosos e baratos</h1>
<button onclick="scrollToProducts()">Ver itens</button>
</section><div class="container" id="produtos">
<input class="search" placeholder="Buscar item..." onkeyup="searchItem(this.value)">
<div id="products"></div>
</div><div id="cartModal">
<div class="cartBox">
<h3>🧾 Pedido</h3>
<ul id="cartItems"></ul>
<p class="total">Total: R$ <span id="total">0.00</span></p>
<input id="name" placeholder="Seu nome">
<button class="checkout" onclick="checkout()">Finalizar</button>
</div>
</div><script>

const data = {
"Chromas":[['Lightbringer C',6.5],['Darkbringer C',6.5],['Luger C',6.5],['Candleflame C',5.9]],
"Low Sets":[['Eternal set',5.8],['Hallow set',4.7]],
"Incomuns":[['Blossom x2',0.5],['Floatie x2',0.8]],
"Sets":[['Set carrot x2',1.4],['Set clownfish x4',0.9]]
};

let cart = JSON.parse(localStorage.getItem('cart')) || [];

function getImg(name){
 return `https://via.placeholder.com/100x80?text=${encodeURIComponent(name)}`;
}

function render(){
 const container=document.getElementById('products');
 container.innerHTML='';
 Object.keys(data).forEach(cat=>{
 container.innerHTML += `<div class="cat-title">${cat}</div><div class="grid">${data[cat].map(p=>`
 <div class="card" onclick="add('${p[0]}',${p[1]})">
 <img src="${getImg(p[0])}">
 <div>${p[0]}</div>
 <div class="price">R$ ${p[1].toFixed(2)}</div>
 <div class="badge">${cat}</div>
 </div>`).join('')}</div>`;
 });
}

function add(name,price){
 cart.push({name,price});
 localStorage.setItem('cart',JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 let total=0;
 const list=document.getElementById('cartItems');
 list.innerHTML='';
 cart.forEach(i=>{
 total+=i.price;
 list.innerHTML += `<li>• ${i.name}</li>`;
 });
 document.getElementById('total').innerText=total.toFixed(2);
}

function toggleCart(){
 const modal=document.getElementById('cartModal');
 modal.style.display = modal.style.display==='flex'?'none':'flex';
 modal.style.display='flex';
}

function checkout(){
 const name=document.getElementById('name').value;
 const total=document.getElementById('total').innerText;
 const items = cart.map(i=>i.name).join(', ');
 const msg=`Pedido Hardy Store%0ACliente:${name}%0AItens:${items}%0ATotal:R$${total}`;
 window.open(`https://wa.me/555192175255?text=${msg}`);
}

function searchItem(q){
 q=q.toLowerCase();
 document.querySelectorAll('.card').forEach(c=>{
 c.style.display = c.innerText.toLowerCase().includes(q)?'block':'none';
 });
}

function scrollToProducts(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

render();
updateCart();

</script></body>
</html>
