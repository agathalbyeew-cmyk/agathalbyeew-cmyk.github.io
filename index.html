<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
:root{
 --grad: linear-gradient(135deg,#ff4ecd,#7a5cff,#00c2ff,#ff9a3c);
}

*{box-sizing:border-box}
body{
 margin:0;
 font-family:'Inter',sans-serif;
 background:#0b0b14;
 color:white;
}

header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:20px 30px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
}

.logo{font-weight:700;font-size:1.5em}

nav a{
 margin-left:20px;
 text-decoration:none;
 color:white;
 opacity:0.8;
}

.hero{
 padding:80px 20px;
 text-align:center;
 background:radial-gradient(circle at top, rgba(255,78,205,0.2), transparent);
}

.hero h1{font-size:3em;margin-bottom:10px}
.hero p{opacity:0.8}

.hero button{
 margin-top:20px;
 padding:15px 35px;
 border:none;
 border-radius:30px;
 background:var(--grad);
 color:white;
 font-weight:600;
 cursor:pointer;
 box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.container{padding:30px}

.topbar{
 display:flex;
 justify-content:space-between;
 align-items:center;
 flex-wrap:wrap;
 margin-bottom:20px;
}

.search{
 padding:10px;
 border-radius:20px;
 border:none;
 width:200px;
}

.filters button{
 margin:5px;
 padding:8px 12px;
 border:none;
 border-radius:20px;
 background:#1a1a2e;
 color:white;
 cursor:pointer;
}

.grid{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;
}

.card{
 background:rgba(255,255,255,0.04);
 border-radius:15px;
 padding:15px;
 transition:0.3s;
 position:relative;
}

.card:hover{
 transform:translateY(-5px);
 box-shadow:0 0 20px rgba(255,255,255,0.15);
}

.badge{
 position:absolute;
 top:10px;
 right:10px;
 background:var(--grad);
 padding:3px 8px;
 border-radius:10px;
 font-size:0.7em;
}

button.add{
 width:100%;
 margin-top:10px;
 padding:10px;
 border:none;
 border-radius:20px;
 background:var(--grad);
 color:white;
 cursor:pointer;
}

#cart{
 position:fixed;
 right:15px;
 bottom:15px;
 width:260px;
 background:#121226;
 border-radius:15px;
 padding:15px;
}

#cartItems{max-height:140px;overflow:auto}

input{
 width:100%;
 margin-top:5px;
 padding:8px;
 border-radius:10px;
 border:none;
}

footer{
 text-align:center;
 padding:30px;
 opacity:0.6;
}

</style></head>
<body><header>
<div class="logo">Hardy Store</div>
<nav>
<a href="#">Início</a>
<a href="#produtos">Produtos</a>
<a href="#">Sobre</a>
</nav>
</header><section class="hero">
<h1>Itens raros com preços reais</h1>
<p>Entrega rápida • Loja confiável • Suporte ativo</p>
<button onclick="scrollToProducts()">Ver Loja</button>
</section><div class="container" id="produtos"><div class="topbar">
<input class="search" placeholder="Buscar..." onkeyup="searchItem(this.value)">
<div class="filters" id="filters"></div>
</div><div class="grid" id="products"></div>
</div><div id="cart">
<h3>Carrinho</h3>
<ul id="cartItems"></ul>
<p>Total: R$ <span id="total">0</span></p>
<input id="name" placeholder="Nome">
<input id="whatsapp" placeholder="WhatsApp">
<button class="add" onclick="checkout()">Finalizar</button>
</div><footer>
<p>Hardy Store © Todos os direitos reservados</p>
</footer><script>

const categories = ["Todos","Comum","Raro","Godly","Ancient"];

const products = [
{name:'Icewing',price:25,stock:5,cat:'Ancient'},
{name:'Chroma Fang',price:40,stock:3,cat:'Godly'},
{name:'Seer',price:10,stock:10,cat:'Comum'},
{name:'Laser',price:20,stock:7,cat:'Raro'}
];

let cart = JSON.parse(localStorage.getItem('cart')) || [];
let currentFilter = 'Todos';

function renderFilters(){
 const f = document.getElementById('filters');
 f.innerHTML='';
 categories.forEach(c=>{
  f.innerHTML += `<button onclick="filter('${c}')">${c}</button>`;
 });
}

function renderProducts(){
 const container = document.getElementById('products');
 container.innerHTML='';
 products
 .filter(p=> currentFilter==='Todos'||p.cat===currentFilter)
 .forEach((p,i)=>{
 container.innerHTML += `
 <div class="card">
 <div class="badge">${p.cat}</div>
 <h3>${p.name}</h3>
 <p>R$ ${p.price}</p>
 <p>Estoque: ${p.stock}</p>
 <button class="add" onclick="addToCart(${i})">Adicionar</button>
 </div>`;
 });
}

function addToCart(i){
 if(products[i].stock<=0) return alert('Sem estoque');
 products[i].stock--;
 cart.push(products[i]);
 localStorage.setItem('cart',JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 const list = document.getElementById('cartItems');
 list.innerHTML='';
 let total=0;
 cart.forEach(item=>{
 total+=item.price;
 list.innerHTML += `<li>${item.name} - R$ ${item.price}</li>`;
 });
 document.getElementById('total').innerText=total;
}

function checkout(){
 const name = document.getElementById('name').value;
 const whatsapp = document.getElementById('whatsapp').value;
 if(!name||!whatsapp)return alert('Preencha os dados');

 const total = document.getElementById('total').innerText;
 const msg = `Pedido Hardy Store%0ACliente: ${name}%0ATotal: R$ ${total}`;
 window.open(`https://wa.me/555192175255?text=${msg}`);

 cart=[];
 localStorage.removeItem('cart');
 updateCart();
}

function filter(cat){
 currentFilter=cat;
 renderProducts();
}

function searchItem(q){
 q=q.toLowerCase();
 const container=document.getElementById('products');
 container.innerHTML='';
 products.filter(p=>p.name.toLowerCase().includes(q)).forEach((p,i)=>{
 container.innerHTML += `
 <div class="card">
 <div class="badge">${p.cat}</div>
 <h3>${p.name}</h3>
 <p>R$ ${p.price}</p>
 <p>Estoque: ${p.stock}</p>
 <button class="add" onclick="addToCart(${i})">Adicionar</button>
 </div>`;
 });
}

function scrollToProducts(){
 document.getElementById('produtos').scrollIntoView({behavior:'smooth'});
}

renderFilters();
renderProducts();
updateCart();

</script></body>
</html>
