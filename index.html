<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hardy Store</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: linear-gradient(135deg, #1a0033, #0a0a1f);
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

nav h2 {
  color: #ff4da6;
}

/* BOTÃO CARRINHO */
.cart-btn {
  cursor: pointer;
}

/* LOGO */
.logo {
  width: 100%;
  max-height: 220px;
  object-fit: cover;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

.cat {
  padding: 10px 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  transition: 0.2s;
}

.cat:hover {
  background: #ff0080;
}

/* PRODUTOS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.produto {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
  width: 180px;
  transition: 0.3s;
}

.produto:hover {
  transform: translateY(-5px) scale(1.05);
}

button {
  background: linear-gradient(45deg, #ff0080, #ffcc00);
  border: none;
  padding: 8px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* CARRINHO */
.carrinho {
  position: fixed;
  right: -300px;
  top: 0;
  width: 280px;
  height: 100%;
  background: #111;
  padding: 15px;
  transition: 0.3s;
}

.carrinho.ativo {
  right: 0;
}

/* ANIMAÇÃO */
@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

.produto {
  animation: fade 0.5s ease;
}
</style>
</head>

<body>

<nav>
<h2>Hardy Store</h2>
<div class="cart-btn" onclick="toggleCarrinho()">🛒</div>
</nav>

<img src="https://cdn.discordapp.com/attachments/1487649742501707820/1497682491639726371/file_00000000f050720e96601de1627a78c9.png" class="logo">

<!-- CATEGORIAS -->
<div class="categorias">
<div class="cat" onclick="filtro('todos')">Todos</div>
<div class="cat" onclick="filtro('incomum')">Incomuns</div>
<div class="cat" onclick="filtro('set')">Sets</div>
<div class="cat" onclick="filtro('chroma')">Chromas</div>
</div>

<!-- PRODUTOS -->
<div class="container" id="produtos">

<div class="produto incomum">
<p>Blossom</p>
<p>R$ 0,50</p>
<button onclick="add('Blossom',0.5)">+</button>
</div>

<div class="produto incomum">
<p>Floatie</p>
<p>R$ 0,80</p>
<button onclick="add('Floatie',0.8)">+</button>
</div>

<div class="produto set">
<p>Set Fire</p>
<p>R$ 3,10</p>
<button onclick="add('Set Fire',3.1)">+</button>
</div>

<div class="produto chroma">
<p>Lightbringer C</p>
<p>R$ 6,50</p>
<button onclick="add('Lightbringer C',6.5)">+</button>
</div>

</div>

<!-- CARRINHO -->
<div class="carrinho" id="carrinho">
<h3>🛒 Carrinho</h3>
<ul id="lista"></ul>
<p>Total: R$ <span id="total">0</span></p>
<button onclick="finalizar()">Finalizar</button>
</div>

<script>
let carrinho = [];
let total = 0;

function add(nome, preco){
  carrinho.push({nome,preco});
  total += preco;
  atualizar();
}

function atualizar(){
  let lista = document.getElementById("lista");
  lista.innerHTML = "";
  carrinho.forEach(i=>{
    let li = document.createElement("li");
    li.textContent = i.nome + " - " + i.preco;
    lista.appendChild(li);
  });
  document.getElementById("total").textContent = total.toFixed(2);
}

function toggleCarrinho(){
  document.getElementById("carrinho").classList.toggle("ativo");
}

function finalizar(){
  let msg="Pedido:%0A";
  carrinho.forEach(i=>{
    msg+=i.nome+" - R$ "+i.preco+"%0A";
  });
  msg+="Total: R$ "+total.toFixed(2);
  window.open("https://wa.me/555192175255?text="+msg);
}

function filtro(cat){
  document.querySelectorAll(".produto").forEach(p=>{
    p.style.display = (cat=="todos"||p.classList.contains(cat))?"block":"none";
  });
}
</script>

</body>
</html>
